<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UGM 2026</title>

  <!-- External Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Slide 1: Title -->
  <section class="slide slide-1 active" id="slide-1">
    <h1>UGM 2026</h1>
    <p>User Group Meeting</p>
  </section>

  <!-- Slide 2: Agenda -->
  <section class="slide slide-2" id="slide-2">
    <h2>Agenda</h2>
    <ul>
      <li>Welcome &amp; Introduction</li>
      <li>Key Updates &amp; Roadmap</li>
      <li>Open Discussion &amp; Q&amp;A</li>
    </ul>
  </section>

  <!-- Slide 3: Thank You -->
  <section class="slide slide-3" id="slide-3">
    <h2>Thank You</h2>
    <p>We appreciate your participation</p>
  </section>

  <!-- Dots indicator -->
  <div class="dots">
    <span class="active" onclick="goTo(0)"></span>
    <span onclick="goTo(1)"></span>
    <span onclick="goTo(2)"></span>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <button id="prevBtn" onclick="navigate(-1)">← Prev</button>
    <span class="counter" id="counter">1 / 3</span>
    <button id="nextBtn" onclick="navigate(1)">Next →</button>
  </div>

  <!-- External Script -->
  <script src="script.js"></script>

</body>
</html>
